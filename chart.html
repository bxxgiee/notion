<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 랭킹 대시보드 (Toss Style)</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans KR"', 'sans-serif'] },
          colors: {
            red: { 500: '#f04452', 50: '#fdf0f1' },
            blue: { 500: '#3182f6', 50: '#eef3fd' },
            gray: { 100: '#f2f4f6', 400: '#8b95a1', 800: '#333d4b', 900: '#191f28' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #ffffff; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 0px; height: 0px; }
    
    .ratio-bar-blue { background-color: #3182f6; height: 4px; border-radius: 2px 0 0 2px; transition: width 0.5s ease; }
    .ratio-bar-red { background-color: #f04452; height: 4px; border-radius: 0 2px 2px 0; transition: width 0.5s ease; }
    
    /* 실제 가격 변동 시 깜빡임 애니메이션 */
    @keyframes flash-red {
      0% { background-color: rgba(240, 68, 82, 0.2); }
      100% { background-color: transparent; }
    }
    @keyframes flash-blue {
      0% { background-color: rgba(49, 130, 246, 0.2); }
      100% { background-color: transparent; }
    }
    .update-up { animation: flash-red 1s ease-out; }
    .update-down { animation: flash-blue 1s ease-out; }
    
    .text-flash-up { color: #f04452 !important; transition: color 0.1s; }
    .text-flash-down { color: #3182f6 !important; transition: color 0.1s; }
    
    /* 로딩 스켈레톤 애니메이션 */
    .shimmer {
      background: #f6f7f8;
      background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
      background-repeat: no-repeat;
      background-size: 800px 100%; 
      animation-duration: 1.5s;
      animation-fill-mode: forwards; 
      animation-iteration-count: infinite;
      animation-name: placeholderShimmer;
      animation-timing-function: linear;
      border-radius: 4px;
    }
    @keyframes placeholderShimmer {
      0% { background-position: -468px 0; }
      100% { background-position: 468px 0; }
    }
  </style>
</head>
<body class="text-gray-900 p-4 max-w-5xl mx-auto">

  <!-- 헤더 & 상태창 -->
  <div class="mb-6 mt-2">
    <div class="flex items-center justify-between gap-4 text-xs font-bold text-gray-500 mb-5">
      <div class="flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-lg">
        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse" id="status-dot"></div>
        <span id="sync-status">실시간 시장 데이터 다이렉트 연결 중...</span>
      </div>
      <div id="last-update" class="text-gray-400 font-medium">업데이트 대기중...</div>
    </div>

    <!-- 상단 지수 카드 -->
    <div class="flex overflow-x-auto gap-4 pb-4 border-b border-gray-100">
      
      <!-- 달러 환율 -->
      <div class="min-w-[180px] flex items-center gap-3 py-2 px-2 hover:bg-gray-50 rounded-xl transition cursor-pointer">
        <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-lg shadow-sm">💵</div>
        <div>
          <div class="text-[11px] font-bold text-gray-400 mb-0.5">달러 환율</div>
          <div class="flex items-baseline gap-1.5" id="idx-FX_IDC:USDKRW">
            <div class="h-5 w-16 shimmer price-placeholder"></div>
            <span class="font-bold text-gray-900 price text-[15px] hidden">로딩중</span>
            <span class="text-[11px] font-bold change text-gray-400 hidden">-</span>
          </div>
        </div>
      </div>

      <!-- 코스피 -->
      <div class="min-w-[180px] flex items-center gap-3 py-2 px-4 border-l border-gray-100 hover:bg-gray-50 rounded-xl transition cursor-pointer">
        <div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center text-lg shadow-sm">🇰🇷</div>
        <div>
          <div class="text-[11px] font-bold text-gray-400 mb-0.5">코스피 종합</div>
          <div class="flex items-baseline gap-1.5" id="idx-KRX:KOSPI">
            <div class="h-5 w-16 shimmer price-placeholder"></div>
            <span class="font-bold text-gray-900 price text-[15px] hidden">로딩중</span>
            <span class="text-[11px] font-bold change text-gray-400 hidden">-</span>
          </div>
        </div>
      </div>
      
      <!-- 나스닥 -->
      <div class="min-w-[180px] flex items-center gap-3 py-2 px-4 border-l border-gray-100 hover:bg-gray-50 rounded-xl transition cursor-pointer">
        <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-lg shadow-sm">🇺🇸</div>
        <div>
          <div class="text-[11px] font-bold text-gray-400 mb-0.5">나스닥 종합</div>
          <div class="flex items-baseline gap-1.5" id="idx-NASDAQ:IXIC">
            <div class="h-5 w-16 shimmer price-placeholder"></div>
            <span class="font-bold text-gray-900 price text-[15px] hidden">로딩중</span>
            <span class="text-[11px] font-bold change text-gray-400 hidden">-</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 탭 네비게이션 -->
  <div class="flex gap-6 mb-2 border-b border-gray-100">
    <div id="tab-kr" onclick="switchTab('kr')" class="pb-3 text-lg font-bold border-b-2 border-gray-900 text-gray-900 cursor-pointer transition">국내 주식 (거래량 순위)</div>
    <div id="tab-us" onclick="switchTab('us')" class="pb-3 text-lg font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-800 cursor-pointer transition">해외 주식 (거래량 순위)</div>
  </div>

  <!-- 리스트 헤더 -->
  <div class="flex items-center px-2 py-3 text-[11px] text-gray-400 font-bold border-b border-gray-100 bg-white sticky top-0 z-10">
    <div class="w-14 text-center">순위</div>
    <div class="flex-grow min-w-[120px]">종목명</div>
    <div class="w-24 text-right">현재가</div>
    <div class="w-20 text-right">등락률</div>
    <div class="w-24 text-right hidden sm:block">거래량</div>
    <div class="w-24 text-right hidden md:block">시장 투심 ⓘ</div>
  </div>

  <!-- 종목 리스트 영역 -->
  <div class="flex flex-col relative min-h-[500px]">
    <!-- 로딩 스켈레톤 컨테이너 -->
    <div id="skeleton-container" class="flex flex-col">
      <!-- JS로 생성됨 -->
    </div>
    
    <!-- 실제 데이터 리스트 -->
    <div id="stock-items" class="flex flex-col pb-10 hidden">
      <!-- JS로 동적 렌더링 -->
    </div>
  </div>

  <script>
    let currentTab = 'kr';
    const prevPrices = {};
    
    // 데이터를 캐싱할 배열
    let rankingData = {
      kr: [],
      us: []
    };

    const INDICES = [
      { id: "KRX:KOSPI", name: "KOSPI" },
      { id: "NASDAQ:IXIC", name: "IXIC" },
      { id: "FX_IDC:USDKRW", name: "USDKRW" }
    ];

    // 포맷팅 함수들
    const formatNum = (num, isUs = false) => {
      if (num == null) return "-";
      if (!isUs) return Math.floor(num).toLocaleString('ko-KR'); 
      // 미국 주식은 1달러 미만 페니스탁도 있으므로 소수점 보장
      if (num < 1) return num.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
      return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    const formatVol = (num) => {
      if(!num) return "-";
      if(num >= 1000000) return (num/1000000).toFixed(1) + "M";
      if(num >= 10000) return (num/10000).toFixed(0) + "만";
      return num.toLocaleString('ko-KR');
    };

    // 로고 색상을 회사 이름 기반으로 랜덤하지만 고정되게 생성
    const getLogoColor = (name) => {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
      return '#' + '00000'.substring(0, 6 - c.length) + c;
    };

    const getLogoInit = (name) => {
      // 영어면 첫 글자, 한국어면 첫 글자
      const char = name.trim().charAt(0);
      return char.toUpperCase();
    };

    // 1. 탭 전환 처리
    function switchTab(tab) {
      currentTab = tab;
      
      const tabKr = document.getElementById('tab-kr');
      const tabUs = document.getElementById('tab-us');
      
      if (tab === 'kr') {
        tabKr.className = "pb-3 text-lg font-bold border-b-2 border-gray-900 text-gray-900 cursor-pointer transition";
        tabUs.className = "pb-3 text-lg font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-800 cursor-pointer transition";
      } else {
        tabUs.className = "pb-3 text-lg font-bold border-b-2 border-gray-900 text-gray-900 cursor-pointer transition";
        tabKr.className = "pb-3 text-lg font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-800 cursor-pointer transition";
      }
      
      renderListItems();
    }

    // 2. 초기 스켈레톤(로딩) 화면 생성
    function renderSkeletons() {
      const container = document.getElementById('skeleton-container');
      container.innerHTML = '';
      for(let i=0; i<10; i++) {
        container.innerHTML += `
          <div class="flex items-center px-2 py-3.5 border-b border-gray-50">
            <div class="w-14 text-center"><div class="h-4 w-4 mx-auto shimmer"></div></div>
            <div class="flex-grow flex items-center gap-3">
              <div class="w-[34px] h-[34px] rounded-full shimmer"></div>
              <div class="h-4 w-24 shimmer"></div>
            </div>
            <div class="w-24 flex justify-end"><div class="h-5 w-16 shimmer"></div></div>
            <div class="w-20 flex justify-end"><div class="h-5 w-12 shimmer"></div></div>
            <div class="w-24 hidden sm:flex justify-end"><div class="h-4 w-12 shimmer"></div></div>
            <div class="w-24 hidden md:flex justify-end"><div class="h-2 w-full shimmer mx-4"></div></div>
          </div>
        `;
      }
    }

    // 3. 실제 데이터로 종목 리스트 렌더링
    function renderListItems() {
      const container = document.getElementById('stock-items');
      const skeleton = document.getElementById('skeleton-container');
      
      const stocks = rankingData[currentTab];
      
      // 데이터가 아직 없으면 스켈레톤 유지
      if (!stocks || stocks.length === 0) {
        skeleton.classList.remove('hidden');
        container.classList.add('hidden');
        return;
      }

      // 데이터가 있으면 스켈레톤 숨기고 컨테이너 보이기
      skeleton.classList.add('hidden');
      container.classList.remove('hidden');
      container.innerHTML = ''; 

      const isUs = (currentTab === 'us');
      const prefix = isUs ? '$' : '';
      const suffix = isUs ? '' : '원';

      stocks.forEach((stock, index) => {
        const row = document.createElement('div');
        row.className = 'flex items-center px-2 py-3.5 hover:bg-gray-50 rounded-[14px] transition duration-200 border-b border-gray-50 last:border-0 cursor-pointer group';
        row.id = `row-${stock.ticker.replace(/[^a-zA-Z0-9]/g, '')}`;
        
        const price = stock.close;
        const changePercent = stock.change;
        const volume = stock.volume;
        
        // 투심 지표 (-1 ~ 1) -> 비율로 변환
        const recommend = stock.recommend || 0;
        const ratioRed = Math.min(100, Math.max(0, Math.round(((recommend + 1) / 2) * 100)));
        const ratioBlue = 100 - ratioRed;

        const isUp = changePercent > 0;
        const isFlat = changePercent === 0;
        const colorClass = isUp ? 'text-red-500' : (isFlat ? 'text-gray-500' : 'text-blue-500');
        const bgClass = isUp ? 'bg-red-50' : (isFlat ? 'bg-gray-100' : 'bg-blue-50');
        const sign = isUp ? '+' : '';
        const priceStr = `${prefix}${formatNum(price, isUs)}${suffix}`;
        
        // 랭킹 메달 색상
        let rankClass = "text-gray-400";
        if (index === 0) rankClass = "text-yellow-500 font-extrabold text-[15px]";
        else if (index === 1) rankClass = "text-gray-400 font-extrabold text-[15px]";
        else if (index === 2) rankClass = "text-amber-600 font-extrabold text-[15px]";

        // 로고
        const logoColor = getLogoColor(stock.name);
        const logoInit = getLogoInit(stock.name);
        
        row.innerHTML = `
          <div class="w-14 text-center font-bold ${rankClass}">${index + 1}</div>
          <div class="flex-grow min-w-[120px] flex items-center gap-3">
            <div class="w-[34px] h-[34px] rounded-full flex items-center justify-center text-white font-bold text-[13px] shadow-sm" style="background-color: ${logoColor};">
              ${logoInit}
            </div>
            <div>
              <div class="font-bold text-gray-900 text-[15px] tracking-tight truncate w-[100px] sm:w-[150px]">${stock.name}</div>
              <div class="text-[11px] text-gray-400 font-medium">${stock.ticker.split(':')[1] || stock.ticker}</div>
            </div>
          </div>
          <div class="w-24 text-right flex justify-end">
            <span class="font-bold text-gray-900 price-col text-[15px] tracking-tight">${priceStr}</span>
          </div>
          <div class="w-20 flex justify-end">
            <span class="change-col ${colorClass} ${bgClass} px-2 py-1 rounded-[6px] text-[13px] font-bold">${sign}${changePercent.toFixed(2)}%</span>
          </div>
          <div class="w-24 flex justify-end text-gray-500 font-medium text-[13px] hidden sm:flex">
             <span class="vol-col">${formatVol(volume)}</span>
          </div>
          <div class="w-24 hidden md:flex items-center justify-end gap-2 pl-4 bar-container" title="매수 투심: ${ratioRed}%">
            <div class="flex-grow flex h-1 gap-[1px]">
              <div class="ratio-bar-blue" style="width: ${ratioBlue}%;"></div>
              <div class="ratio-bar-red" style="width: ${ratioRed}%;"></div>
            </div>
          </div>
        `;
        container.appendChild(row);

        // 이전 가격 저장 (다음 깜빡임 효과를 위해)
        prevPrices[stock.ticker] = price;
      });
    }

    // 4. 깜빡임 업데이트 (랭킹 데이터가 업데이트 되었을 때 UI 갱신)
    function updateListWithAnimation() {
      const stocks = rankingData[currentTab];
      if (!stocks) return;

      const isUs = (currentTab === 'us');
      const prefix = isUs ? '$' : '';
      const suffix = isUs ? '' : '원';

      stocks.forEach((stock) => {
        const safeId = stock.ticker.replace(/[^a-zA-Z0-9]/g, '');
        const rowEl = document.getElementById(`row-${safeId}`);
        if (!rowEl) return; // 순위 밖으로 밀려나서 UI에 없으면 패스 (곧 다시 그려짐)

        const price = stock.close;
        const changePercent = stock.change;
        const volume = stock.volume;
        
        const isUp = changePercent > 0;
        const isFlat = changePercent === 0;
        const colorClass = isUp ? 'text-red-500' : (isFlat ? 'text-gray-500' : 'text-blue-500');
        const bgClass = isUp ? 'bg-red-50' : (isFlat ? 'bg-gray-100' : 'bg-blue-50');
        const sign = isUp ? '+' : '';
        const priceStr = `${prefix}${formatNum(price, isUs)}${suffix}`;
        
        // 투심 업데이트
        const recommend = stock.recommend || 0;
        const ratioRed = Math.min(100, Math.max(0, Math.round(((recommend + 1) / 2) * 100)));
        const ratioBlue = 100 - ratioRed;

        if (prevPrices[stock.ticker] && prevPrices[stock.ticker] !== price) {
          const animClass = price > prevPrices[stock.ticker] ? 'update-up' : 'update-down';
          const textAnimClass = price > prevPrices[stock.ticker] ? 'text-flash-up' : 'text-flash-down';
          
          rowEl.classList.remove('update-up', 'update-down');
          void rowEl.offsetWidth; 
          rowEl.classList.add(animClass);

          const priceCol = rowEl.querySelector('.price-col');
          priceCol.classList.add(textAnimClass);
          setTimeout(() => priceCol.classList.remove('text-flash-up', 'text-flash-down'), 300);
        }
        prevPrices[stock.ticker] = price;

        rowEl.querySelector('.price-col').innerText = priceStr;
        rowEl.querySelector('.change-col').className = `change-col ${colorClass} ${bgClass} px-2 py-1 rounded-[6px] text-[13px] font-bold`;
        rowEl.querySelector('.change-col').innerText = `${sign}${changePercent.toFixed(2)}%`;
        rowEl.querySelector('.vol-col').innerText = formatVol(volume);
        
        rowEl.querySelector('.ratio-bar-blue').style.width = `${ratioBlue}%`;
        rowEl.querySelector('.ratio-bar-red').style.width = `${ratioRed}%`;
      });
    }

    // 5. [핵심] 트레이딩뷰 스크리너 API에서 실시간 랭킹 가져오기
    async function fetchRealData() {
      try {
        // 1. 코스피/나스닥/환율 지수 요청
        const idxPromise = fetch('https://scanner.tradingview.com/korea/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            symbols: { tickers: INDICES.map(i => i.id) },
            columns: ["close", "change"]
          })
        }).then(r => r.json());

        // 2. 한국 주식 거래량 TOP 10 요청
        const krRankingPromise = fetch('https://scanner.tradingview.com/korea/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            filter: [{"left": "type", "operation": "equal", "right": "stock"}],
            options: {"lang": "ko"},
            sort: {"sortBy": "volume", "sortOrder": "desc"},
            range: [0, 10], // 1위부터 10위까지
            columns: ["name", "description", "close", "change", "volume", "Recommend.All"]
          })
        }).then(r => r.json());

        // 3. 미국 주식 거래량 TOP 10 요청 (나스닥, 뉴욕증시 주요 종목)
        const usRankingPromise = fetch('https://scanner.tradingview.com/america/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            filter: [
              {"left": "type", "operation": "equal", "right": "stock"},
              {"left": "exchange", "operation": "in_range", "right": ["NASDAQ", "NYSE"]}
            ],
            options: {"lang": "ko"},
            sort: {"sortBy": "volume", "sortOrder": "desc"},
            range: [0, 10],
            columns: ["name", "description", "close", "change", "volume", "Recommend.All"]
          })
        }).then(r => r.json());

        // 병렬 요청 실행
        const [idxRes, krRes, usRes] = await Promise.all([idxPromise, krRankingPromise, usRankingPromise]);

        // --- 지수 처리 ---
        if (idxRes && idxRes.data) {
          idxRes.data.forEach(item => {
            const symbol = item.s;
            const price = item.d[0];
            const changePercent = item.d[1];
            
            const el = document.getElementById(`idx-${symbol}`);
            if(el) {
              const isUp = changePercent > 0;
              const colorClass = isUp ? 'text-red-500' : (changePercent < 0 ? 'text-blue-500' : 'text-gray-500');
              const sign = isUp ? '+' : '';
              const isKrw = symbol.includes("KRW");
              const priceFormat = isKrw ? formatNum(price, false) : formatNum(price, true);

              // 스켈레톤 끄기
              el.querySelector('.price-placeholder').classList.add('hidden');
              el.querySelector('.price').classList.remove('hidden');
              el.querySelector('.change').classList.remove('hidden');

              el.querySelector('.price').innerText = priceFormat;
              const changeEl = el.querySelector('.change');
              changeEl.innerText = `${sign}${changePercent.toFixed(2)}%`;
              changeEl.className = `text-[11px] font-bold change ${colorClass}`;
            }
          });
        }

        // --- 랭킹 데이터 처리 ---
        const parseRanking = (resData) => {
          return resData.map(item => ({
            ticker: item.s,
            name: item.d[1] || item.d[0], // description (회사명) 없으면 티커명
            close: item.d[2],
            change: item.d[3],
            volume: item.d[4],
            recommend: item.d[5] // -1 to 1
          }));
        };

        if (krRes && krRes.data) rankingData.kr = parseRanking(krRes.data);
        if (usRes && usRes.data) rankingData.us = parseRanking(usRes.data);

        // UI 통신 성공 업데이트
        const now = new Date();
        document.getElementById('last-update').innerText = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')} 갱신`;
        document.getElementById('sync-status').innerText = "실시간 다이렉트 랭킹 연동 중";
        document.getElementById('sync-status').classList.replace('text-red-500', 'text-gray-500');
        document.getElementById('status-dot').classList.replace('bg-red-500', 'bg-green-500');

        // 처음 로드된 상태(스켈레톤이 보이는 상태)면 전체를 새로 그린다
        if (document.getElementById('skeleton-container').classList.contains('hidden') === false) {
          renderListItems();
        } else {
          // 이미 리스트가 있다면 애니메이션 효과만 주며 데이터 업데이트 (순위가 바뀌면 다시 그리기)
          // 간단히 처리하기 위해, 순위가 자주 바뀌는 랭킹 특성상 전체를 다시 그리되 애니메이션을 넣음
          renderListItems(); 
          updateListWithAnimation();
        }

      } catch (e) {
        console.warn('API Fetch Failed:', e);
        document.getElementById('sync-status').innerText = "통신 지연 (재시도 중)";
        document.getElementById('sync-status').classList.replace('text-gray-500', 'text-red-500');
        document.getElementById('status-dot').classList.replace('bg-green-500', 'bg-red-500');
      }
    }

    // 스크립트 실행 시작
    renderSkeletons(); // 처음에 스켈레톤 띄우기
    fetchRealData();
    
    // 거래량 랭킹 갱신 및 시세 깜빡임 반영 (10초 주기)
    setInterval(fetchRealData, 10000);

  </script>
</body>
</html>

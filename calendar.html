<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Minimal Calendar with Mood</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

        :root {
            --bg-color: #A7C7E7; 
            --text-color: #FFFFFF;
            --today-bg: #FFFFFF;
            --today-text: #A7C7E7;
            --selected-border: rgba(255, 255, 255, 0.7);
            --stroke-color: rgba(255, 255, 255, 0.4);
            --inner-glow: inset 0 0 25px rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 10px; 
            background-color: transparent;
            color: var(--text-color);
            font-family: 'Nunito', 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 20px);
            overflow: hidden;
            box-sizing: border-box;
        }

        .calendar-box {
            width: 100%;
            max-width: 380px;
            padding: 30px 25px 25px 25px;
            box-sizing: border-box;
            background-color: var(--bg-color);
            border-radius: 20px;
            user-select: none;
            transition: all 0.3s ease;
            border: 1.5px solid var(--stroke-color);
            box-shadow: var(--inner-glow);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .month-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #month-year {
            font-size: 1.25rem;
            font-weight: 800;
            min-width: 80px;
            text-align: center;
            line-height: 1;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.1); }

        .today-btn {
            background-color: white;
            color: var(--bg-color);
            border: none;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            justify-items: center;
        }

        .day-name {
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 10px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .day-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .day {
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s ease;
            position: relative;
            z-index: 2;
            box-sizing: border-box;
        }

        .day.today { background-color: white; color: var(--bg-color); font-weight: 900; }
        .day.selected { border: 2px dashed var(--selected-border); }

        .sticker-on-day {
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 0.9rem;
            z-index: 5;
        }

        .mood-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1.5px dashed rgba(255, 255, 255, 0.3);
        }

        .sticker-palette {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.12);
            padding: 8px 10px;
            border-radius: 14px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .sticker-palette::-webkit-scrollbar { display: none; }

        .sticker-item {
            font-size: 1.2rem;
            cursor: pointer;
            width: 34px;
            height: 34px;
            min-width: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="calendar-box">
        <div class="header">
            <div class="month-controls">
                <button id="prev-month" class="nav-btn">❮</button>
                <div id="month-year"></div>
                <button id="next-month" class="nav-btn">❯</button>
            </div>
            <button id="go-today" class="today-btn">today</button>
        </div>
        <div class="grid">
            <div class="day-name">Sun</div><div class="day-name">Mon</div><div class="day-name">Tue</div>
            <div class="day-name">Wed</div><div class="day-name">Thu</div><div class="day-name">Fri</div>
            <div class="day-name">Sat</div>
        </div>
        <div class="grid" id="calendar-days"></div>
        <div class="mood-section">
            <div class="sticker-palette" id="emoji-list"></div>
        </div>
    </div>
    <script>
        let displayDate = new Date();
        let selectedDate = new Date();
        let stickers = {};
        const emojis = ['😊', '🥰', '🤩', '🥳', '😎', '😭', '😡', '🤔', '💖', '🔥', '✨', '☁️', '☀️', '🌈', '🌸', '🧸', '🍰', '🐾', '🌙', '☕', '🌷', '✅'];

        function render() {
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();
            document.getElementById('month-year').innerText = `${year}. ${String(month + 1).padStart(2, '0')}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const container = document.getElementById('calendar-days');
            container.innerHTML = '';

            for (let i = 0; i < firstDay; i++) container.appendChild(document.createElement('div'));

            for (let i = 1; i <= daysInMonth; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'day-wrapper';
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.innerText = i;
                
                if (year === new Date().getFullYear() && month === new Date().getMonth() && i === new Date().getDate()) dayEl.classList.add('today');
                if (year === selectedDate.getFullYear() && month === selectedDate.getMonth() && i === selectedDate.getDate()) dayEl.classList.add('selected');

                const key = `${year}-${month}-${i}`;
                if (stickers[key]) {
                    const s = document.createElement('span');
                    s.className = 'sticker-on-day';
                    s.innerText = stickers[key];
                    wrapper.appendChild(s);
                }

                dayEl.onclick = () => { selectedDate = new Date(year, month, i); render(); };
                wrapper.appendChild(dayEl);
                container.appendChild(wrapper);
            }
        }

        document.getElementById('prev-month').onclick = () => { displayDate.setMonth(displayDate.getMonth() - 1); render(); };
        document.getElementById('next-month').onclick = () => { displayDate.setMonth(displayDate.getMonth() + 1); render(); };
        document.getElementById('go-today').onclick = () => { displayDate = new Date(); selectedDate = new Date(); render(); };

        const palette = document.getElementById('emoji-list');
        emojis.forEach(e => {
            const item = document.createElement('div');
            item.className = 'sticker-item';
            item.innerText = e;
            item.onclick = () => {
                const key = `${selectedDate.getFullYear()}-${selectedDate.getMonth()}-${selectedDate.getDate()}`;
                stickers[key] = stickers[key] === e ? null : e;
                render();
            };
            palette.appendChild(item);
        });
        render();
    </script>
</body>
</html>

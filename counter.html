<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>🧶 단수 카운터</title>
<!-- 프리텐다드 웹 폰트 로드 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    /* 심플 테마 컬러 팔레트 */
    --bg-outside: #F8F9FA;
    --bg-main: #FFFFFF;
    --surface: #FFFFFF;
    --border: #E9ECEF;
    --border-dark: #DEE2E6;
    
    /* 텍스트 컬러 */
    --text-main: #1A1D20;
    --text-sub: #495057;
    --text-dim: #ADB5BD;
    
    /* 포인트 컬러 */
    --primary: #FF748C;
    --primary-bg: #FFE5EA;
    --secondary: #38BDF8;
    --secondary-bg: #E0F2FE;
    
    --radius-lg: 24px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { background-color: var(--bg-outside); }
  
  body {
    max-width: 480px; 
    margin: 0 auto;
    background-color: var(--bg-main);
    min-height: 100vh;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
    color: var(--text-main);
    padding: 0 0 60px;
    position: relative;
  }

  /* --- 헤더 (버튼 제거로 더 깔끔해짐) --- */
  .header {
    padding: 30px 20px 20px;
    display: flex;
    align-items: center;
    justify-content: center; /* 중앙 정렬 */
  }
  .logo {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* --- 탭 --- */
  .tabs-wrap {
    padding: 0 20px 10px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 10px 18px;
    background: var(--bg-outside);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
    user-select: none;
  }
  .tab.active { 
    background: var(--primary); 
    color: white; 
    border-color: var(--primary);
  }

  .tab-x {
    display: none;
    position: absolute;
    top: -4px; right: -4px;
    width: 20px; height: 20px;
    background: var(--text-main);
    border-radius: 50%;
    font-size: 0.65rem;
    font-weight: bold;
    line-height: 20px;
    text-align: center;
    color: white;
    cursor: pointer;
    z-index: 10;
  }
  .tab:hover .tab-x { display: block; }
  .tab.active:hover .tab-x { background: white; color: var(--primary); }

  .tab-add {
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    background: white;
    border: 1.5px solid var(--border-dark);
    border-radius: 50%;
    color: var(--text-sub);
    font-weight: 600;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .tab-add:active { transform: scale(0.9); border-color: var(--primary); color: var(--primary); }

  /* --- 위젯 --- */
  .widget {
    margin: 15px 20px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    position: relative;
  }

  /* --- 카운터 위젯 --- */
  .project-name-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .project-name {
    font-family: inherit;
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--text-main);
    background: none;
    border: none;
    outline: none;
    flex: 1;
    width: 100%;
  }

  /* 공통 딱지(Badge) 디자인 */
  .parity-badge {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 6px;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .parity-badge.odd  { background: var(--primary-bg); color: var(--primary); }
  .parity-badge.even { background: var(--secondary-bg); color: var(--secondary); }

  .count-display { text-align: center; padding: 15px 0 30px; }
  .count-label { font-size: 0.8rem; font-weight: 700; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 4px; }
  .count-number {
    font-size: 6.5rem;
    font-weight: 900;
    line-height: 1;
    color: var(--text-main);
    display: block;
    letter-spacing: -2px;
    transition: transform 0.1s;
  }
  .count-number.bump  { transform: scale(1.08); color: var(--primary); }

  /* --- 목표 영역 --- */
  .goal-section { margin-bottom: 25px; }
  .goal-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .goal-label { font-size: 0.85rem; font-weight: 700; color: var(--text-sub); }
  .goal-input {
    width: 60px; background: var(--bg-outside); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px; font-family: inherit;
    font-weight: 700; font-size: 0.9rem; color: var(--text-main); 
    outline: none; text-align: center;
  }
  .goal-pct { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-left: auto; }
  
  .progress-track { height: 12px; background: var(--bg-outside); border-radius: 100px; overflow: hidden; border: 1px solid var(--border); }
  .progress-fill {
    height: 100%; background: var(--primary);
    width: 0%; transition: width 0.4s ease;
  }
  .progress-fill.done { background: #34D399; }

  /* --- 버튼 --- */
  .btn-row-main { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; }
  .btn-side {
    background: var(--bg-outside); border: 1px solid var(--border); border-radius: var(--radius-md);
    color: var(--text-sub); font-size: 1.4rem; font-weight: 600;
    cursor: pointer; padding: 16px 0; transition: all 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-side:active { background: var(--border); }

  .btn-main {
    background: var(--primary); border: none; border-radius: var(--radius-md);
    color: white; font-family: inherit; font-weight: 800;
    font-size: 1.4rem; cursor: pointer; padding: 18px 0;
    transition: all 0.1s; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
  }
  .btn-main:active { transform: scale(0.97); opacity: 0.9; }
  .btn-main-sub { font-size: 0.7rem; font-weight: 600; opacity: 0.8; letter-spacing: 0.5px; }

  /* --- 메모 --- */
  .memo-input { 
    width: 100%; background: var(--bg-outside); border: 1px solid var(--border); 
    border-radius: var(--radius-sm); padding: 14px; outline: none; 
    font-family: inherit; font-size: 0.95rem; color: var(--text-main); 
    resize: none; line-height: 1.5; min-height: 80px;
  }

  /* --- 히스토리 --- */
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-item { 
    display: flex; align-items: center; gap: 12px; 
    padding: 12px 16px; background: var(--bg-outside); 
    border: 1px solid var(--border);
    border-radius: var(--radius-sm); 
  }
  .history-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
  .history-dot.up { background: var(--primary); }
  .history-row { font-weight: 800; font-size: 1rem; color: var(--text-main); }
  .history-time { font-size: 0.75rem; font-weight: 600; color: var(--text-dim); margin-left: auto; }
  .history-empty { font-size: 0.9rem; color: var(--text-dim); text-align: center; padding: 20px 0; }

  /* --- 모달 (그림자 제거) --- */
  .modal-bg { 
    display: none; position: fixed; inset: 0; 
    background: rgba(0,0,0,0.5); z-index: 200; 
    align-items: flex-end; justify-content: center; 
  }
  .modal-bg.show { display: flex; }
  .modal { 
    background: var(--surface); 
    border-radius: var(--radius-lg) var(--radius-lg) 0 0; 
    padding: 30px 24px 40px; width: 100%; max-width: 480px; 
    animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; text-align: center; }
  .modal-input { 
    width: 100%; background: var(--bg-outside); border: 1px solid var(--border-dark); 
    border-radius: var(--radius-sm); padding: 16px; font-family: inherit; 
    font-size: 1.05rem; outline: none; margin-bottom: 16px; 
  }
  .modal-btn { 
    width: 100%; background: var(--primary); border: none; 
    border-radius: var(--radius-sm); padding: 18px; font-weight: 800; 
    font-size: 1.1rem; color: white; cursor: pointer;
  }
  .modal-cancel { 
    width: 100%; background: none; border: none; 
    padding: 15px; font-weight: 700; color: var(--text-sub); cursor: pointer;
  }

  .btn-danger { background: #343A40; }
  .confirm-msg { text-align: center; margin-bottom: 25px; color: var(--text-sub); line-height: 1.5; }
  .confirm-btn-wrap { display: flex; gap: 10px; }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 100px;
    font-weight: 600; font-size: 0.9rem; z-index: 999; transition: transform 0.3s;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes vibrate { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-4px)} 40%,80%{transform:translateX(4px)} }
  .vibrate { animation: vibrate 0.3s; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🧶 단수 카운터</div>
</div>

<div class="tabs-wrap" id="tabsWrap"></div>

<div class="widget" id="counterCard">
  <div class="project-name-wrap">
    <input class="project-name" id="projectName" type="text" placeholder="프로젝트 이름..." oninput="saveCurrentProject()" />
    <div class="parity-badge odd" id="parityBadge">홀수단</div>
  </div>
  
  <div class="count-display">
    <div class="count-label">CURRENT ROW</div>
    <span class="count-number" id="countNumber">0</span>
  </div>
  
  <div class="goal-section">
    <div class="goal-row">
      <span class="goal-label">🎯 목표</span>
      <input class="goal-input" id="goalInput" type="number" min="0" placeholder="0" oninput="updateGoal()" />
      <span class="goal-pct" id="goalPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
  
  <div class="btn-row-main">
    <button class="btn-side" onclick="decrement()">−</button>
    <button class="btn-main" onclick="increment()">
      단수 +1
      <span class="btn-main-sub">TAP</span>
    </button>
    <button class="btn-side" onclick="resetCount()">↺</button>
  </div>
</div>

<div class="widget">
  <div style="font-size:0.85rem; font-weight:800; color:var(--text-sub); margin-bottom:12px;">📝 메모장</div>
  <textarea class="memo-input" id="memoInput" placeholder="팁이나 도안 메모..." oninput="saveCurrentProject()"></textarea>
</div>

<div class="widget">
  <div style="font-size:0.85rem; font-weight:800; color:var(--text-sub); margin-bottom:15px;">⏱ 최근 기록</div>
  <div class="history-list" id="historyList"></div>
</div>

<!-- 모달들 -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-title">새 프로젝트</div>
    <input class="modal-input" id="newProjectName" placeholder="작품 이름을 적어주세요" maxlength="20" />
    <button class="modal-btn" onclick="confirmAdd()">추가하기</button>
    <button class="modal-cancel" onclick="closeModal('addModal')">취소</button>
  </div>
</div>

<div class="modal-bg" id="confirmModal">
  <div class="modal">
    <div class="modal-title" id="confirmTitle">확인</div>
    <div class="confirm-msg" id="confirmMsg">실행하시겠습니까?</div>
    <div class="confirm-btn-wrap">
      <button class="modal-cancel" onclick="closeModal('confirmModal')" style="flex:1">취소</button>
      <button class="modal-btn btn-danger" id="confirmBtn" style="flex:2">확인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let projects = [];
let activeIdx = 0;
const KEY = 'knitting_counter_v5_simple';
let currentConfirmCallback = null;

window.addEventListener('load', () => {
  load();
  if (!projects.length) projects.push({ name: '내 첫 작품', count: 0, goal: 0, memo: '', history: [] });
  save();
  renderAll();
});

function cur() { return projects[activeIdx]; }

function openConfirm(title, msg, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  currentConfirmCallback = callback;
  document.getElementById('confirmModal').classList.add('show');
}

document.getElementById('confirmBtn').addEventListener('click', () => {
  if (currentConfirmCallback) currentConfirmCallback();
  closeModal('confirmModal');
});

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('show');
}

function increment() {
  const p = cur();
  p.count++;
  logHistory(p, 'up');
  save();
  animCount('bump');
  updateUI();
}

function decrement() {
  const p = cur();
  if (p.count <= 0) {
    document.getElementById('counterCard').classList.add('vibrate');
    setTimeout(() => document.getElementById('counterCard').classList.remove('vibrate'), 300);
    return;
  }
  p.count--;
  logHistory(p, 'down');
  save();
  updateUI();
}

function resetCount() {
  if (cur().count === 0) return;
  openConfirm('초기화', '현재 기록을 모두 지우고 0단부터 시작할까요?', () => {
    cur().count = 0;
    cur().history = [];
    save();
    updateUI();
  });
}

function logHistory(p, dir) {
  const now = new Date();
  p.history.unshift({ row: p.count, dir, timestamp: now.getTime() });
  if (p.history.length > 5) p.history.pop();
}

function formatHistoryTime(ts) {
  if (!ts) return "-";
  const date = new Date(ts);
  const now = new Date();
  const timeStr = `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
  
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const target = new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
  const diff = Math.round((today - target) / (1000 * 60 * 60 * 24));

  if (diff === 0) return `오늘 ${timeStr}`;
  if (diff === 1) return `어제 ${timeStr}`;
  return `${date.getMonth() + 1}/${date.getDate()} ${timeStr}`;
}

function updateGoal() {
  cur().goal = parseInt(document.getElementById('goalInput').value) || 0;
  save();
  updateProgress();
}

function updateProgress() {
  const p = cur();
  const pct = p.goal > 0 ? Math.min(100, Math.round(p.count / p.goal * 100)) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressFill').classList.toggle('done', pct >= 100);
  document.getElementById('goalPct').textContent = pct + '%';
}

function saveCurrentProject() {
  cur().name = document.getElementById('projectName').value || '제목 없음';
  cur().memo = document.getElementById('memoInput').value;
  save();
  renderTabs();
}

function switchTo(idx) {
  activeIdx = idx;
  save();
  renderAll();
}

function deleteProject(idx) {
  if (projects.length <= 1) return;
  openConfirm('프로젝트 삭제', `"${projects[idx].name}"을 삭제하시겠습니까?`, () => {
    projects.splice(idx, 1);
    if (activeIdx >= projects.length) activeIdx = projects.length - 1;
    save();
    renderAll();
  });
}

function openAddModal() {
  document.getElementById('newProjectName').value = '';
  document.getElementById('addModal').classList.add('show');
}

function confirmAdd() {
  const name = document.getElementById('newProjectName').value.trim() || '새 프로젝트';
  projects.push({ name, count: 0, goal: 0, memo: '', history: [] });
  activeIdx = projects.length - 1;
  save();
  closeModal('addModal');
  renderAll();
}

function renderAll() { renderTabs(); updateUI(); }

function renderTabs() {
  const wrap = document.getElementById('tabsWrap');
  wrap.innerHTML = '';
  projects.forEach((p, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === activeIdx ? ' active' : '');
    tab.textContent = p.name;
    tab.onclick = () => switchTo(i);
    const x = document.createElement('span');
    x.className = 'tab-x';
    x.textContent = '✕';
    x.onclick = (e) => { e.stopPropagation(); deleteProject(i); };
    tab.appendChild(x);
    wrap.appendChild(tab);
  });
  const add = document.createElement('button');
  add.className = 'tab-add';
  add.innerHTML = '+';
  add.onclick = openAddModal;
  wrap.appendChild(add);
}

function updateUI() {
  const p = cur();
  document.getElementById('projectName').value = p.name;
  document.getElementById('countNumber').textContent = p.count;
  document.getElementById('goalInput').value = p.goal || '';
  document.getElementById('memoInput').value = p.memo || '';
  const badge = document.getElementById('parityBadge');
  const isEven = p.count % 2 === 0;
  badge.textContent = isEven ? '짝수단' : '홀수단';
  badge.className = 'parity-badge ' + (isEven ? 'even' : 'odd');
  updateProgress();
  renderHistory();
}

function renderHistory() {
  const p = cur();
  const list = document.getElementById('historyList');
  if (!p.history.length) {
    list.innerHTML = '<div class="history-empty">기록이 여기에 표시됩니다.</div>';
    return;
  }
  list.innerHTML = p.history.map(h => {
    const isEven = h.row % 2 === 0;
    return `
      <div class="history-item">
        <span class="history-dot ${h.dir}"></span>
        <span class="history-row">${h.row}단</span>
        <span class="parity-badge ${isEven ? 'even' : 'odd'}" style="transform:scale(0.85);">${isEven ? '짝수' : '홀수'}</span>
        <span class="history-time">${formatHistoryTime(h.timestamp)}</span>
      </div>
    `;
  }).join('');
}

function animCount(type) {
  const el = document.getElementById('countNumber');
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add(type);
  setTimeout(() => el.classList.remove(type), 150);
}

function save() { localStorage.setItem(KEY, JSON.stringify({ projects, activeIdx })); }
function load() {
  const d = JSON.parse(localStorage.getItem(KEY) || 'null');
  if (d) { projects = d.projects; activeIdx = d.activeIdx; }
}
</script>
</body>
</html>

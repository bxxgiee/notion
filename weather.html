<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Minimal Time & Weather - White Version</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

        :root {
            --bg-color: #FFFFFF; 
            --point-color: #A7C7E7; 
            --text-color: #A7C7E7;
            --sub-text-color: rgba(167, 199, 231, 0.8);
            /* 대안: 은은한 하늘색 선 + 네거티브 스프레드 그림자 */
            --stroke-color: rgba(167, 199, 231, 0.2);
            --soft-glow: 0 15px 35px -10px rgba(167, 199, 231, 0.4);
        }

        body {
            margin: 0;
            padding: 35px; /* 그림자가 퍼질 수 있는 충분한 공간 확보 */
            background-color: transparent;
            color: var(--text-color);
            font-family: 'Nunito', 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
            overflow: hidden;
            box-sizing: border-box;
        }

        .widget-box {
            width: 100%;
            max-width: 380px; /* 캘린더와 가로비율 통일 */
            padding: 40px 25px; 
            box-sizing: border-box;
            background-color: var(--bg-color);
            /* 1. 얇고 연한 테두리 추가 */
            border: 1px solid var(--stroke-color); 
            border-radius: 20px;
            user-select: none;
            transition: all 0.3s ease;
            /* 2. 네거티브 스프레드 그림자 (안쪽으로 모이면서 부드럽게 퍼짐) */
            box-shadow: var(--soft-glow);
            position: relative;
        }

        /* 시간 섹션 */
        .time-section {
            margin-bottom: 5px;
            text-align: center;
        }

        #clock {
            font-size: clamp(2.3rem, 11vw, 3.5rem); 
            font-weight: 800; 
            letter-spacing: -1px;
            line-height: 1;
            color: var(--point-color);
        }

        #ampm {
            font-size: clamp(0.7rem, 3.5vw, 1rem);
            font-weight: 700;
            margin-left: 5px;
            opacity: 0.8;
        }

        /* 날짜 섹션 */
        #date {
            font-size: clamp(0.9rem, 4vw, 1.05rem);
            font-weight: 600;
            color: var(--sub-text-color);
            text-align: center;
            margin-bottom: 30px;
        }

        /* 구분선 */
        .divider {
            width: 100%;
            height: 1.5px;
            border-top: 1.5px dashed var(--point-color);
            opacity: 0.3;
            margin-bottom: 25px;
        }

        /* 날씨 정보 섹션 */
        .weather-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; 
            margin-bottom: 25px;
        }

        .weather-icon {
            font-size: clamp(2.2rem, 10vw, 2.8rem);
            animation: floating 3s ease-in-out infinite;
        }

        .weather-info {
            text-align: left;
        }

        .weather-title {
            font-size: clamp(0.7rem, 3vw, 0.8rem);
            font-weight: 400; 
            margin-bottom: 5px;
            opacity: 0.85;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--point-color);
        }

        #temp {
            font-size: clamp(1.8rem, 8vw, 2.2rem);
            font-weight: 800;
            line-height: 1;
            color: var(--point-color);
        }

        #condition {
            font-size: clamp(0.75rem, 3.5vw, 0.9rem);
            font-weight: 400;
            color: var(--sub-text-color);
            margin-top: 5px;
        }

        /* 예보 섹션 (오늘/내일) */
        .forecast-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: #F8FBFF; 
            padding: 12px 15px;
            border-radius: 15px;
        }

        .forecast-item {
            text-align: center;
        }

        .forecast-label {
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--point-color);
            opacity: 0.8;
        }

        .forecast-temp {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--point-color);
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-7px); }
        }
    </style>
</head>
<body>

    <div class="widget-box">
        <div class="time-section">
            <div id="clock">00:00<span id="ampm">AM</span></div>
        </div>
        <div id="date">2024. 00. 00. WED</div>

        <div class="divider"></div>

        <div class="weather-content">
            <div id="weather-icon" class="weather-icon">☁️</div>
            <div class="weather-info">
                <div class="weather-title">
                    ☁️ <span id="location-name">서울</span>의 날씨
                </div>
                <div id="temp">--°C</div>
                <div id="condition">데이터 로드 중...</div>
            </div>
        </div>

        <div class="forecast-grid">
            <div class="forecast-item">
                <div class="forecast-label">오늘</div>
                <div id="today-forecast" class="forecast-temp">-- / --</div>
            </div>
            <div class="forecast-item">
                <div class="forecast-label">내일</div>
                <div id="tomorrow-forecast" class="forecast-temp">-- / --</div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // 1. 설정값 (기본값: Seoul)
        const city = urlParams.get('city') || 'Seoul';
        const API_KEY = '8e20252538b7042a983b9c0379201977';

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            
            h = h % 12 || 12;
            const hStr = String(h).padStart(2, '0');

            document.getElementById('clock').innerHTML = `${hStr}:${m}<span id="ampm">${ampm}</span>`;

            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const week = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            document.getElementById('date').innerText = `${year}. ${month}. ${day}. ${week[now.getDay()]}`;
        }

        async function getWeatherData() {
            const conditionEl = document.getElementById('condition');
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); 

                const currentRes = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}&lang=kr`,
                    { signal: controller.signal }
                );
                
                clearTimeout(timeoutId);

                if (!currentRes.ok) throw new Error('API 데이터 오류');
                const currentData = await currentRes.json();

                if (currentData.cod === 200) {
                    document.getElementById('location-name').innerText = currentData.name;
                    document.getElementById('temp').innerText = `${Math.round(currentData.main.temp)}°C`;
                    conditionEl.innerText = currentData.weather[0].description;
                    
                    const iconText = document.getElementById('weather-icon');
                    const main = currentData.weather[0].main.toLowerCase();
                    
                    if (main.includes('cloud')) iconText.innerText = "☁️";
                    else if (main.includes('rain')) iconText.innerText = "☔";
                    else if (main.includes('clear')) iconText.innerText = "☀️";
                    else if (main.includes('snow')) iconText.innerText = "❄️";
                    else iconText.innerText = "🌤️";

                    document.getElementById('today-forecast').innerText = 
                        `${Math.round(currentData.main.temp_max)}° / ${Math.round(currentData.main.temp_min)}°`;
                }

                const forecastRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}&lang=kr`);
                const forecastData = await forecastRes.json();

                if (forecastData.cod === "200") {
                    const tomorrow = forecastData.list[8] || forecastData.list[forecastData.list.length - 1]; 
                    document.getElementById('tomorrow-forecast').innerText = 
                        `${Math.round(tomorrow.main.temp_max)}° / ${Math.round(tomorrow.main.temp_min)}°`;
                }

            } catch (error) {
                console.error("Weather load failed:", error);
                conditionEl.innerText = "날씨 정보 연결 중...";
                // 연결 실패 시 10초 후 재시도
                setTimeout(getWeatherData, 10000);
            }
        }

        updateClock();
        setInterval(updateClock, 1000);
        
        getWeatherData();
        setInterval(getWeatherData, 1800000); 
    </script>
</body>
</html>

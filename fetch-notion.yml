name: Notion 데이터 동기화

on:
  schedule:
    - cron: '0 * * * *'   # 매 1시간마다 자동 실행
  workflow_dispatch:        # 수동 실행 버튼도 생김

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: 노션 데이터 가져오기
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          DATE_PROP: ${{ secrets.DATE_PROP }}
          IMG_PROP: ${{ secrets.IMG_PROP }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, urllib.error

          TOKEN   = os.environ["NOTION_TOKEN"]
          DB_ID   = os.environ["NOTION_DB_ID"].replace("-", "")
          DB_ID_F = f"{DB_ID[:8]}-{DB_ID[8:12]}-{DB_ID[12:16]}-{DB_ID[16:20]}-{DB_ID[20:]}"
          DATE_PROP = os.environ.get("DATE_PROP", "날짜")
          IMG_PROP  = os.environ.get("IMG_PROP",  "파일과 미디어")

          headers = {
              "Authorization": f"Bearer {TOKEN}",
              "Notion-Version": "2022-06-28",
              "Content-Type": "application/json",
          }

          # DB 메타 가져오기
          req = urllib.request.Request(
              f"https://api.notion.com/v1/databases/{DB_ID_F}",
              headers=headers
          )
          with urllib.request.urlopen(req) as r:
              meta = json.loads(r.read())
          db_title = meta.get("title", [{}])[0].get("plain_text", "Notion DB")

          # 페이지 전체 가져오기 (페이지네이션)
          results = []
          body = {"page_size": 100}
          while True:
              data = json.dumps(body).encode()
              req = urllib.request.Request(
                  f"https://api.notion.com/v1/databases/{DB_ID_F}/query",
                  data=data, headers=headers, method="POST"
              )
              with urllib.request.urlopen(req) as r:
                  resp = json.loads(r.read())
              results.extend(resp.get("results", []))
              if not resp.get("has_more"):
                  break
              body["start_cursor"] = resp["next_cursor"]

          entries = []
          for page in results:
              props = page.get("properties", {})

              # 날짜 추출
              date = None
              dp = props.get(DATE_PROP, {})
              t = dp.get("type")
              if t == "date" and dp.get("date"):
                  date = dp["date"].get("start", "")[:10]
              elif t == "created_time":
                  date = dp.get("created_time", "")[:10]
              elif t == "last_edited_time":
                  date = dp.get("last_edited_time", "")[:10]
              if not date:
                  continue

              # 이미지 URL 추출
              imgs = []
              ip = props.get(IMG_PROP, {})
              if ip.get("type") == "files":
                  for f in ip.get("files", []):
                      if f.get("type") == "external":
                          imgs.append(f["external"]["url"])
                      elif f.get("type") == "file":
                          imgs.append(f["file"]["url"])  # 만료 URL이지만 일단 저장

              # 제목 추출
              title = "(제목 없음)"
              for v in props.values():
                  if v.get("type") == "title" and v.get("title"):
                      title = "".join(t.get("plain_text", "") for t in v["title"])
                      break

              entries.append({"date": date, "imgs": imgs, "title": title})

          output = {
              "dbTitle": db_title,
              "updatedAt": __import__("datetime").datetime.utcnow().isoformat() + "Z",
              "entries": entries
          }

          os.makedirs("notion/img_cal", exist_ok=True)
          with open("notion/img_cal/data.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"✅ {len(entries)}개 항목 저장 완료")
          EOF

      - name: data.json 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notion/img_cal/data.json
          git diff --cached --quiet || git commit -m "🔄 Notion 데이터 동기화 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

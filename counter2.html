<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Atelier Knit Counter</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #F7F5F2; 
    --card: #FFFFFF;
    --accent: #8E735B; 
    --text-main: #3A3530;
    --text-sub: #A09B95;
    --border: #E8E4DF;
    --success: #C5A059; 
    --goal-bg: #EAE2D7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    max-width: 420px;
    margin: 0 auto;
    background-color: var(--bg);
    font-family: 'Pretendard', sans-serif;
    color: var(--text-main);
    padding: 40px 24px;
    line-height: 1.6;
  }

  /* --- Top Navigation --- */
  .nav-container {
    width: 100%;
    overflow-x: auto;
    white-space: nowrap;
    margin-bottom: 40px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 4px 0;
  }
  .nav-container::-webkit-scrollbar { display: none; }

  .nav {
    display: inline-flex;
    gap: 16px;
  }
  
  .nav-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.3s ease;
    padding-bottom: 4px;
    border-bottom: 2px solid transparent;
  }
  .nav-item.active {
    color: var(--accent);
    font-weight: 700;
    border-bottom: 2px solid var(--accent);
  }
  .delete-btn {
    font-size: 14px;
    opacity: 0.4;
    padding: 0 4px;
    margin-left: 2px;
    transition: opacity 0.2s;
  }
  .delete-btn:hover { opacity: 1; color: #D98E8E; }

  /* --- Main Objet Card --- */
  .objet-card {
    background: var(--card);
    border-radius: 20px;
    padding: 40px 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(142, 115, 91, 0.08);
    margin-bottom: 32px;
    position: relative;
    transition: all 0.5s ease;
  }
  .objet-card.completed {
    box-shadow: 0 15px 35px rgba(197, 160, 89, 0.2);
    border: 1px solid rgba(197, 160, 89, 0.1);
  }

  .objet-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-sub);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: block;
  }

  .title-input {
    font-size: 1.25rem;
    font-weight: 400;
    border: none; outline: none;
    text-align: center;
    color: var(--text-main);
    background: transparent;
    width: 100%;
    margin-bottom: 40px;
    font-family: serif;
  }

  .num {
    font-size: 7rem;
    font-weight: 300;
    color: var(--text-main);
    line-height: 0.8;
    letter-spacing: -0.05em;
    transition: all 0.5s ease;
  }
  .objet-card.completed .num {
    color: var(--success);
    text-shadow: 0 0 15px rgba(197, 160, 89, 0.2);
  }

  .unit {
    font-size: 0.9rem;
    color: var(--text-sub);
    margin: 8px 0 40px 0;
    display: block;
    font-weight: 500;
  }

  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
  }
  .btn-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    transition: all 0.2s;
  }
  .btn-icon:active { transform: scale(0.9); }
  
  .btn-plus {
    width: 72px; height: 72px;
    background: var(--accent);
    color: white;
    border: none;
    box-shadow: 0 8px 20px rgba(142, 115, 91, 0.3);
  }

  /* --- Secondary Info --- */
  .info-section {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .info-tile {
    padding: 24px;
    background: transparent;
    border-top: 1px solid var(--border);
  }
  .info-tile h3 {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 16px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .memo-textarea {
    width: 100%;
    border: none; outline: none;
    font-family: inherit;
    font-size: 0.9rem;
    color: var(--text-main);
    background: transparent;
    line-height: 1.6;
    resize: none;
    height: 50px;
  }

  /* Progress 영역 가로 나열 수정 */
  .progress-section {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .target-pill {
    display: inline-flex;
    align-items: center;
    background: var(--goal-bg);
    border-radius: 6px;
    padding: 4px 8px;
    flex-shrink: 0;
  }
  .goal-input {
    width: 35px;
    border: none; outline: none;
    color: var(--accent);
    font-weight: 700;
    font-family: inherit;
    font-size: 0.85rem;
    background: transparent;
    text-align: center;
  }

  .progress-bar-container {
    flex-grow: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.5s ease;
  }
  .completed .progress-fill { background: var(--success); }

  .pct-text {
    font-size: 0.85rem;
    color: var(--text-sub);
    font-weight: 700;
    flex-shrink: 0;
    min-width: 35px;
    text-align: right;
  }

  .log-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #F0EFEB;
    font-size: 0.85rem;
  }
  .log-row .time { color: var(--text-sub); font-size: 0.75rem; }

  .parity-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
  }
  .dot-odd { background: #D98E8E; }
  .dot-even { background: #8EAD98; }

  .success-msg {
    display: none;
    font-size: 0.7rem;
    color: var(--success);
    margin-top: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }
  .completed .success-msg { display: block; animation: fadeIn 0.8s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="nav-container">
  <div class="nav" id="navList"></div>
</div>

<div class="objet-card" id="mainCard">
  <span class="objet-label" id="parityLabel">Odd Row</span>
  <input class="title-input" id="pTitle" type="text" placeholder="Project Title" oninput="saveCurrentProject()" />
  
  <div class="count-wrap">
    <div class="num" id="rowVal">0</div>
    <span class="unit">Completed Rows</span>
  </div>

  <div class="controls">
    <button class="btn-icon" onclick="updateCount(-1)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
    <button class="btn-icon btn-plus" onclick="updateCount(1)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
    <button class="btn-icon" onclick="resetCurrentCount()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
    </button>
  </div>
  <div class="success-msg">✦ TARGET REACHED ✦</div>
</div>

<div class="info-section">
  <div class="info-tile">
    <h3>Pattern Notes</h3>
    <textarea class="memo-textarea" id="memoIn" placeholder="패턴을 기록하세요..." oninput="saveCurrentProject()"></textarea>
  </div>
  
  <div class="info-tile">
    <h3>Progress</h3>
    <div class="progress-section">
      <!-- 목표(Goal) -->
      <div class="target-pill">
        <span style="font-size: 0.55rem; font-weight: 800; color: var(--accent); margin-right: 4px;">GOAL</span>
        <input class="goal-input" id="goalIn" type="number" oninput="saveCurrentProject()" placeholder="0">
      </div>
      
      <!-- 과정(Progress Bar) -->
      <div class="progress-bar-container">
        <div class="progress-fill" id="goalFill"></div>
      </div>
      
      <!-- 결과(Percent) -->
      <span class="pct-text" id="pctVal">0%</span>
    </div>
  </div>

  <div class="info-tile">
    <h3>Recent Activity</h3>
    <div id="logBox"></div>
  </div>
</div>

<script>
let state = { projects: [], activeIdx: 0 };
const KEY = 'knit_atelier_v4';

window.onload = () => {
  const saved = localStorage.getItem(KEY);
  if (saved) {
    state = JSON.parse(saved);
  } else {
    state.projects.push({ name: 'My Project', count: 0, goal: 0, memo: '', logs: [] });
  }
  render();
};

const cur = () => state.projects[state.activeIdx] || state.projects[0];

function updateCount(v) {
  const p = cur();
  if (!p) return;
  if (v < 0 && p.count <= 0) return;
  p.count += v;
  const now = new Date();
  p.logs.unshift({ r: p.count, t: `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}` });
  if (p.logs.length > 5) p.logs.pop();
  
  saveData();
  updateUI();
}

function resetCurrentCount() {
  const p = cur();
  if (!p) return;
  if (confirm('이 프로젝트의 단수 기록을 초기화할까요?')) {
    p.count = 0;
    p.logs = [];
    saveData();
    updateUI();
  }
}

function saveCurrentProject() {
  const p = cur();
  if (!p) return;
  p.name = document.getElementById('pTitle').value || 'Untitled';
  p.goal = parseInt(document.getElementById('goalIn').value) || 0;
  p.memo = document.getElementById('memoIn').value;
  saveData();
  renderNav();
}

function saveData() {
  localStorage.setItem(KEY, JSON.stringify(state));
}

function renderNav() {
  const nav = document.getElementById('navList');
  nav.innerHTML = state.projects.map((p, i) => `
    <div class="nav-item ${i === state.activeIdx ? 'active' : ''}" onclick="switchProject(${i})">
      <span>${p.name}</span>
      ${state.projects.length > 1 ? `<span class="delete-btn" onclick="deleteProject(event, ${i})">✕</span>` : ''}
    </div>
  `).join('') + `<div class="nav-item" style="opacity:0.5" onclick="addNewProject()">+ Add New</div>`;
}

function switchProject(i) {
  state.activeIdx = i;
  saveData();
  render();
}

function addNewProject() {
  const name = prompt('새로운 작업 이름을 입력하세요.') || 'New Project';
  state.projects.push({ name, count: 0, goal: 0, memo: '', logs: [] });
  state.activeIdx = state.projects.length - 1;
  saveData();
  render();
}

function deleteProject(e, idx) {
  e.stopPropagation(); 
  const p = state.projects[idx];
  if (confirm(`'${p.name}' 프로젝트를 삭제할까요?`)) {
    state.projects.splice(idx, 1);
    if (state.activeIdx === idx) {
      state.activeIdx = Math.max(0, state.activeIdx - 1);
    } else if (state.activeIdx > idx) {
      state.activeIdx--;
    }
    saveData();
    render();
  }
}

function render() {
  renderNav();
  updateUI();
}

function updateUI() {
  const p = cur();
  if (!p) return;
  
  const card = document.getElementById('mainCard');
  document.getElementById('pTitle').value = p.name;
  document.getElementById('rowVal').textContent = p.count;
  document.getElementById('goalIn').value = p.goal || '';
  document.getElementById('memoIn').value = p.memo || '';
  
  const isEven = p.count % 2 === 0;
  const label = document.getElementById('parityLabel');
  label.innerHTML = `<span class="parity-dot ${isEven ? 'dot-even' : 'dot-odd'}"></span>${isEven ? 'Even Row' : 'Odd Row'}`;
  
  const pct = p.goal > 0 ? Math.min(100, Math.round(p.count / p.goal * 100)) : 0;
  document.getElementById('pctVal').textContent = pct + '%';
  document.getElementById('goalFill').style.width = pct + '%';

  if (p.goal > 0 && p.count >= p.goal) {
    card.classList.add('completed');
  } else {
    card.classList.remove('completed');
  }
  
  const logBox = document.getElementById('logBox');
  logBox.innerHTML = p.logs.map(l => `
    <div class="log-row">
      <span><span style="color:var(--accent); font-weight:700;">${l.r}</span>단 완료</span>
      <span class="time">${l.t}</span>
    </div>
  `).join('') || '<div style="font-size:0.8rem; color:var(--text-sub); padding:10px 0;">기록이 없습니다.</div>';
}
</script>
</body>
</html>

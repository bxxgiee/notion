<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Identity Card Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=Libre+Barcode+39&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f4f4f4;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --accent: #2c3e50;
            --line-color: #000000;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 프리미엄 가로형 신분증 레이아웃 */
        .id-card {
            width: 540px;
            height: 320px;
            background: var(--card-bg);
            border-radius: 4px; /* 조금 더 각진 느낌으로 전문성 강조 */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            display: flex;
            position: relative;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        /* 왼쪽 블랙 바 디자인 (이미지 참고) */
        .side-bar {
            width: 50px;
            background: var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 10px 0;
        }

        .side-text {
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            font-size: 14px;
            letter-spacing: 0.3em;
            font-weight: 800;
            opacity: 0.8;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-top-info {
            position: absolute;
            top: 25px;
            right: 30px;
            font-size: 11px;
            font-weight: 700;
            color: #888;
        }

        .card-body {
            display: flex;
            gap: 35px;
            margin-top: 20px;
        }

        /* 프로필 사진 영역 */
        .photo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .photo-frame {
            width: 140px;
            height: 140px;
            border-radius: 8px;
            border: 1px solid #eee;
            overflow: hidden;
            background: #fafafa;
        }

        .photo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 바코드 디자인 */
        .barcode {
            font-family: 'Libre Barcode 39', cursive;
            font-size: 42px;
            margin-top: 5px;
            color: #000;
        }

        .barcode-label {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.1em;
            margin-top: -5px;
        }

        /* 데이터 입력 영역 (이미지 언더라인 스타일) */
        .data-fields {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .field-row {
            border-bottom: 1.5px solid var(--line-color);
            padding-bottom: 4px;
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .field-label {
            width: 80px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-main);
            flex-shrink: 0;
        }

        .field-value {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 숨겨진 설정 트리거 */
        #admin-trigger {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 30px;
            height: 30px;
            z-index: 10;
        }

        #admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            width: 320px;
            display: none;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .input-box {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            width: 100%;
        }

        .save-btn {
            background: #000;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="id-card">
        <div class="side-bar">
            <div class="side-text">IDENTITY CARD</div>
        </div>

        <div class="main-content">
            <div class="card-top-info" id="p-id">ID - 001</div>

            <div class="card-body">
                <div class="photo-area">
                    <div class="photo-frame">
                        <img id="p-img" class="photo-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Profile">
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="barcode">12345678</div>
                        <div class="barcode-label">IDENTITY CARD</div>
                    </div>
                </div>

                <div class="data-fields">
                    <div class="field-row">
                        <span class="field-label">Name</span>
                        <span id="p-name" class="field-value">Loading..</span>
                    </div>
                    <div class="field-row">
                        <span class="field-label">Stage Name</span>
                        <span id="p-stage" class="field-value">-</span>
                    </div>
                    <div class="field-row">
                        <span class="field-label">Date of Birth</span>
                        <span id="p-dob" class="field-value">-</span>
                    </div>
                    <div class="field-row">
                        <span class="field-label">Blood Type</span>
                        <span id="p-blood" class="field-value">-</span>
                    </div>
                    <div class="field-row">
                        <span class="field-label">Nationality</span>
                        <span id="p-nation" class="field-value">-</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="admin-trigger"></div>
    </div>

    <!-- 설정창 -->
    <div id="admin-panel">
        <h3 class="font-bold text-center mb-2">Widget Config</h3>
        <input type="password" id="n-key" class="input-box" placeholder="Notion API Key">
        <input type="text" id="n-db" class="input-box" placeholder="Database ID">
        <button onclick="saveAndFetch()" class="save-btn">Connect & Save</button>
        <button onclick="hideAdmin()" class="text-xs text-gray-400 mt-2">Close</button>
    </div>

    <script>
        let clicks = 0;
        document.getElementById('admin-trigger').onclick = () => {
            clicks++;
            if(clicks === 3) { showAdmin(); clicks = 0; }
            setTimeout(() => clicks = 0, 500);
        };

        function showAdmin() { document.getElementById('admin-panel').style.display = 'flex'; }
        function hideAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        async function saveAndFetch() {
            const key = document.getElementById('n-key').value;
            const db = document.getElementById('n-db').value;
            localStorage.setItem('n_key', key);
            localStorage.setItem('n_db', db);
            sync(key, db);
        }

        async function sync(key, db) {
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://api.notion.com/v1/databases/${db}/query`)}`;
            try {
                const res = await fetch(proxy);
                const json = JSON.parse((await res.json()).contents);
                const item = json.results[0].properties;

                // 노션 속성 이름과 매핑 (이름, 예명, 생일, 혈액형, 국적, 이미지, 번호)
                document.getElementById('p-name').innerText = item['이름']?.title[0]?.plain_text || '-';
                document.getElementById('p-stage').innerText = item['예명']?.rich_text[0]?.plain_text || '-';
                document.getElementById('p-dob').innerText = item['생일']?.rich_text[0]?.plain_text || '-';
                document.getElementById('p-blood').innerText = item['혈액형']?.rich_text[0]?.plain_text || '-';
                document.getElementById('p-nation').innerText = item['국적']?.rich_text[0]?.plain_text || '-';
                document.getElementById('p-id').innerText = "ID - " + (item['번호']?.rich_text[0]?.plain_text || '001');
                
                const img = item['이미지']?.files[0];
                document.getElementById('p-img').src = img?.file?.url || img?.external?.url || '';

                hideAdmin();
            } catch(e) { console.error(e); }
        }

        window.onload = () => {
            const k = localStorage.getItem('n_key'), d = localStorage.getItem('n_db');
            if(k && d) sync(k, d);
        }
    </script>
</body>
</html>
